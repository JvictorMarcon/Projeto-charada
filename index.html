<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gerador de Charadas</title>
</head>

<body class="bg-blue-100 flex flex-col items-center justify-center min-h-screen p-4">

    <h1 class="text-3xl text-bold mb-12">Gerador de Charadas</h1>

    <div class="group w-full max-w-sm [perspective:1000px] h-64">
        <div id="card-inner"
            class="relative w-full h-full transition-all duration-500 [transform-style:preserve-3d] cursor-pointer shadow-2xl rounded-2xl">

            <div
                class="absolute inset-0 [backface-visibility:hidden] bg-white rounded-2xl flex flex-col items-center justify-center p-6 text-center border-2 border-blue-500">
                <span class="text-blue-500 font-bold uppercase tracking-widest text-xs mb-2">Pergunta</span>
                <p id="pergunta" class="text-2xl font-medium text-gray-800 italic">Carregando charada...</p>
                <p class="mt-4 text-gray-400 text-xs font-light">Clique para ver a resposta</p>
            </div>

            <div
                class="absolute inset-0 [backface-visibility:hidden] bg-blue-600 rounded-2xl flex flex-col items-center justify-center p-6 text-center text-white [transform:rotateY(180deg)]">
                <span class="text-blue-200 font-bold uppercase tracking-widest text-xs mb-2">Resposta</span>
                <p id="resposta" class="text-2xl font-bold"></p>
            </div>

        </div>
    </div>

    <button id="btn-nova"
        class="mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition-transform active:scale-95 shadow-lg">
        Nova Charada 🎲
    </button>
    <p class="mt-4 text-2xl">Pontos: <span id="contador"></span></p> 
    <div class="mt-8 flex flex-col sm:flex-row gap-2 w-full max-w-sm">
        <input type="text" id="resposta_usuario"
            class="flex-1 bg-white border-2 border-blue-200 focus:border-blue-500 outline-none font-medium text-center py-3 px-6 rounded-full transition-all shadow-md"
            placeholder="Insira a resposta">

        <button id="btn-confirmar"
            class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-full transition-transform active:scale-95 shadow-lg">
            Confirmar
        </button>

    </div>
    <script src="script.js"></script>

</body>

</html>
